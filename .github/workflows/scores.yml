name: World Cup Score Updater

on:
  schedule:
    # Hourly watchdog — loops automatically during active match windows
    - cron: '0 * * * *'
  workflow_dispatch:   # allow manual trigger from Actions tab

jobs:
  update-scores:
    runs-on: ubuntu-latest
    timeout-minutes: 240   # 4-hour cap (covers full match + extra time)
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run score updater (loop during active matches)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          while true; do
            EXIT=0
            python scripts/score_updater.py || EXIT=$?

            # Commit & push only if scores.json actually changed on disk
            git add js/scores.json
            if ! git diff --staged --quiet; then
              git commit -m "chore: update match scores [skip ci]"
              git pull --rebase origin main
              git push
            else
              echo "No score changes — nothing to commit."
            fi

            # Exit 1 from script = no active matches → stop looping
            if [ $EXIT -ne 0 ]; then
              echo "No active matches. Job done."
              break
            fi

            echo "Active match in progress — next update in 12 minutes…"
            sleep 720
          done
