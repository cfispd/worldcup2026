name: World Cup Score Updater

on:
  schedule:
    # Fallback trigger — cron-job.org is the primary every-25-min trigger
    - cron: '*/30 * * * *'
  workflow_dispatch:

concurrency:
  group: score-updater
  cancel-in-progress: true   # skip duplicate runs; only one at a time

jobs:
  update-scores:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run score updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          EXIT=0
          python scripts/score_updater.py || EXIT=true

      - name: Commit & push if scores changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/scores.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: update match scores [skip ci]"
            git pull --rebase origin main
            git push
          else
            echo "No score changes — nothing to commit."
          fi
