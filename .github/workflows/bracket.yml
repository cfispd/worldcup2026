name: Daily Bracket Update

on:
  schedule:
    # Midnight UTC every day — after June 24 group stage matches finish
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-bracket:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compute bracket team assignments
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/score_updater.py --bracket-only

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/scores.json
          git diff --staged --quiet \
            && echo "No bracket changes." \
            || (git commit -m "chore: update bracket teams [skip ci]" && git push)
